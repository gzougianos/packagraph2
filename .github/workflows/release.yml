name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build fat JAR
        run: mvn -B clean package -DskipTests

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Rename JAR
        run: mv target/packagraph2-*.jar target/packagraph2-${{ steps.version.outputs.VERSION }}.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/packagraph2-${{ steps.version.outputs.VERSION }}.jar
          generate_release_notes: true
